databases:
  - name: greencode-db
    databaseName: greencode
    user: greencode
    region: frankfurt
    plan: free

services:
  - type: web
    name: greencode
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://greencode-qg35.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: SANCTUM_STATEFUL_DOMAINS
        value: greencode-qg35.onrender.com
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: true
